<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
  integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
  crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"
  integrity="sha384-XQqX/4yiUGu+oyr87jvWzRuqBUK/adrY0DunhL+tID9m/9dwSpV8h9Fk/Sg6ifVQ"
  crossorigin="anonymous"></script>
<script>
  const SRC = "https://raw.githubusercontent.com/PangMo5/Amado/main/docs/CONFIGURATION.md";
  const content = document.getElementById("content");

  function slug(text) {
    return text.toLowerCase().trim().replace(/[^\w\s-]/g, "").replace(/\s+/g, "-").replace(/-+/g, "-");
  }

  function fail() {
    content.innerHTML = '<p class="state">Couldn\'t load the configuration reference. Read it on <a href="https://github.com/PangMo5/Amado/blob/main/docs/CONFIGURATION.md">GitHub</a>.</p>';
  }

  async function load() {
    if (typeof marked === "undefined" || typeof DOMPurify === "undefined") return fail();
    let markdown;
    try {
      const response = await fetch(SRC, { cache: "no-cache" });
      if (!response.ok) throw new Error(response.status);
      markdown = await response.text();
    } catch (error) { return fail(); }

    content.innerHTML = DOMPurify.sanitize(marked.parse(markdown));
    const sideNav = document.getElementById("side-nav");
    const used = {};
    const headings = content.querySelectorAll("h2, h3");
    headings.forEach((heading) => {
      let id = slug(heading.textContent) || "section";
      if (used[id] != null) { used[id] += 1; id += "-" + used[id]; } else { used[id] = 0; }
      heading.id = id;
      const link = document.createElement("a");
      link.href = "#" + id;
      link.textContent = heading.textContent;
      link.className = heading.tagName === "H3" ? "lvl-3" : "lvl-2";
      link.dataset.target = id;
      sideNav.appendChild(link);
    });
    if (headings.length) document.getElementById("side").hidden = false;

    const links = Array.from(sideNav.querySelectorAll("a"));
    const byID = Object.fromEntries(links.map((link) => [link.dataset.target, link]));
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        links.forEach((link) => link.classList.remove("active"));
        if (byID[entry.target.id]) byID[entry.target.id].classList.add("active");
      });
    }, { rootMargin: "-64px 0px -70% 0px", threshold: 0 });
    headings.forEach((heading) => observer.observe(heading));
  }

  load();
</script>
