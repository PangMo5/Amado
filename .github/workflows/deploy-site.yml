name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "docs/CONFIGURATION.md"
      - "CHANGELOG.md"
      - "Amado/Resources/Assets.xcassets/AppIcon.appiconset/icon_1024.png"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assemble site
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SITE="$RUNNER_TEMP/site"
          mkdir -p "$SITE"

          VERSION="$(gh release view --repo "$REPO" --json tagName -q .tagName 2>/dev/null | sed 's/^v//' || true)"
          echo "Latest version: ${VERSION:-<none>}"

          cp web/*.html web/*.css "$SITE/"
          cp Amado/Resources/Assets.xcassets/AppIcon.appiconset/icon_1024.png "$SITE/icon.png"
          if [ -n "$VERSION" ]; then
            sed -i "s/__VERSION__/${VERSION}/g" "$SITE/index.html"
          else
            sed -i "s/__VERSION__/0.1.0/g" "$SITE/index.html"
          fi

          BUST="${GITHUB_SHA:0:8}"
          sed -i "s#\"./style.css\"#\"./style.css?v=${BUST}\"#g" "$SITE"/*.html

          # A Pages deploy replaces the whole site. Always take Sparkle's feed
          # from the latest GitHub Release so a first release does not depend on
          # an appcast already existing on the website.
          if [ -n "$VERSION" ]; then
            gh release download "v${VERSION}" --repo "$REPO" \
              --pattern appcast.xml --dir "$SITE"
            echo "Bundled release appcast.xml ($(wc -c < "$SITE/appcast.xml") bytes)"
          else
            echo "No release yet; appcast.xml is not expected"
          fi

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
